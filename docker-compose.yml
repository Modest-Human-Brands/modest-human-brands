name: 'modest-human-brands-dev'
services:
  app:
    build: .
    restart: on-failure:3
    env_file:
      - .env.prod
    ports:
      - 4000:3000
    networks:
      - internal

  drive:
    build: ../code-drive
    restart: on-failure:3
    env_file:
      - ../code-drive/.env.prod.redcatpictures
      # - ../code-drive/.env.prod.goldfishtalents
    ports:
      - 4600:3111 # REST API
      - 4601:3112 # Stream
      - 4602:49134 # WebSocket bridge
      - 4610:1935 # RTMP
    networks:
      - internal
    # extra_hosts:
    #   - "host.docker.internal:host-gateway"
    # drive-redis:
    #   image: redis:alpine
    #   restart: unless-stopped
    #   ports:
    #     - '6379:6379'
    #   volumes:
    #     - redis-data:/data
    #   healthcheck:
    #     test: [ 'CMD', 'redis-cli', 'ping' ]
    #     interval: 10s
    #     timeout: 5s
    #     retries: 5

  media:
    build: ../code-media
    restart: on-failure:3
    env_file:
      - ../code-media/.env.prod
    volumes:
      - data:/app/data
      - static:/app/static
    networks:
      - internal

  ome:
    image: airensoft/ovenmediaengine:latest
    restart: on-failure:3
    ports:
      - '3333:3333' #
      - '3334:3334'
      - '3478:3478' # TURN TCP relay
      - '9999:9999/udp' # SRT ingest
      - '3480:3480' # LLHSL playback
      - '8080:8080' # HLS/DASH playback
      - '8081:8081' # REST API
      - '10000-10005:10000-10005/udp' #
    volumes:
      - ./config/ome.xml:/opt/ovenmediaengine/bin/origin_conf/Server.xml
      - ./config/omeRecord.xml:/opt/ovenmediaengine/bin/origin_conf/record_map.xml
      - static:/opt/ovenmediaengine/media
    networks:
      - internal

volumes:
  data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../code-media/data
  static:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../code-media/static
      # device: ../code-media/static/red-cat-pictures
      # device: ../code-media/static/gold-fish-talents
      # redis-data:

networks:
  internal:
    driver: bridge
