name: 'modest-human-brands-dev'
services:
  app:
    build: .
    restart: on-failure:3
    env_file:
      - .env.prod
    ports:
      - 4000:3000
    networks:
      - internal

  connect:
    build: ../code-connect
    restart: on-failure:3
    env_file:
      - ../code-connect/.env.prod
    volumes:
      - mconnect-data:/app/data
    ports:
      - 5000:3111
    networks:
      - internal

  doc:
    build: ../code-doc
    restart: on-failure:3
    env_file:
      - ../code-doc/.env.prod
    ports:
      - 4700:3000
    networks:
      - internal
    depends_on:
      doc-gotenberg:
        condition: service_healthy
  coordinate-synapse:
    image: matrixdotorg/synapse:latest
    restart: on-failure:3
    networks:
      - internal
    expose:
      - 8008
    volumes:
      - /root/synapse/data:/data
    depends_on:
      coordinate-synapse-postgres:
        condition: service_healthy

  coordinate-synapse-postgres:
    image: postgres:latest
    restart: on-failure:3
    networks:
      - internal
    environment:
      - POSTGRES_USER=synapse_user
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=synapse
      - POSTGRES_INITDB_ARGS=--encoding='UTF8' --lc-collate='C' --lc-ctype='C'
    volumes:
      - /root/synapse/postgres:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U synapse_user -d synapse']
      interval: 10s
      timeout: 5s
      retries: 5

  drive:
    build: ../code-drive
    restart: on-failure:3
    env_file:
      - ../code-drive/.env.prod
    ports:
      - 4600:3000
    networks:
      - internal

  media:
    build: ../code-media
    restart: on-failure:3
    env_file:
      - ../code-media/.env.prod
    volumes:
      - mmedia-data:/app/data
      - mmedia-static:/app/static
    networks:
      - internal

  media-ome:
    image: airensoft/ovenmediaengine:latest
    restart: on-failure:3
    ports:
      - '3333:3333' #
      - '3334:3334'
      - '3478:3478' # TURN TCP relay
      - '9999:9999/udp' # SRT ingest
      - '3480:3480' # LLHSL playback
      - '8080:8080' # HLS/DASH playback
      - '8081:8081' # REST API
      - '10000-10005:10000-10005/udp' #
    volumes:
      - ./config/ome.xml:/opt/ovenmediaengine/bin/origin_conf/Server.xml
      - ./config/omeRecord.xml:/opt/ovenmediaengine/bin/origin_conf/record_map.xml
      - mmedia-static:/opt/ovenmediaengine/media
    networks:
      - internal

volumes:
  mconnect-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../code-connect/data
  mmedia-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../code-media/data
  mmedia-static:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../code-media/static
      # device: ../code-media/static/red-cat-pictures
      # device: ../code-media/static/gold-fish-talents
      # redis-data:

networks:
  internal:
    driver: bridge
