name: 'modest-human-brands-dev'
services:
  app:
    build: .
    restart: on-failure:3
    env_file:
      - .env.prod
    ports:
      - 4000:3000
    networks:
      - internal

  assist:
    build: ../code-assist
    restart: on-failure:3
    env_file:
      - ../code-assist/.env.prod
    volumes:
      - ../code-assist/artifact:/artifact
    ports:
      - 6000:3111
    networks:
      - internal
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [ gpu ]

    # model-init:
    #   image: python:3.11-slim
    #   volumes:
    #     - D:/Models/huggingface:/hf_cache
    #   environment:
    #     - HF_TOKEN=${HF_TOKEN} # optional — OmniVoice is public
    #     - HF_ENDPOINT=${HF_ENDPOINT:-https://huggingface.co}
    #   command: >
    #     bash -c "
    #       pip install -q huggingface_hub &&
    #       python -c \"
    #       from huggingface_hub import snapshot_download
    #       snapshot_download('k2-fsa/OmniVoice', cache_dir='/hf_cache')
    #       print('Model ready.')
    #       \"
    #     "

  assist-triton:
    build: ../code-assist/inference
    volumes:
      - ../code-assist/inference/model_repository:/models
      - ../code-assist/artifact:/artifact
      - D:/Models/huggingface:/root/.cache/huggingface/hub
    ports:
      - '8000:8000' # HTTP
      - '8001:8001' # gRPC
      - '8002:8002' # metrics
    networks:
      - internal
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  connect:
    build: ../code-connect
    restart: on-failure:3
    env_file:
      - ../code-connect/.env.prod
    volumes:
      - mconnect-data:/app/data
    ports:
      - 5000:3111
    networks:
      - internal

  doc:
    build: ../code-doc
    restart: on-failure:3
    env_file:
      - ../code-doc/.env.prod
    ports:
      - 4700:3000
    networks:
      - internal

  coordinate-synapse:
    image: matrixdotorg/synapse:latest
    restart: on-failure:3
    volumes:
      - /root/synapse/data:/data
    expose:
      - 8008
    networks:
      - internal
    depends_on:
      coordinate-synapse-postgres:
        condition: service_healthy

  coordinate-synapse-postgres:
    image: postgres:latest
    restart: on-failure:3
    environment:
      - POSTGRES_USER=synapse_user
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=synapse
      - POSTGRES_INITDB_ARGS=--encoding='UTF8' --lc-collate='C' --lc-ctype='C'
    volumes:
      - /root/synapse/postgres:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U synapse_user -d synapse']
      interval: 10s
      timeout: 5s
      retries: 5

  drive:
    build: ../code-drive
    restart: on-failure:3
    env_file:
      - ../code-drive/.env.prod
    ports:
      - 4600:3000
    networks:
      - internal

  media:
    build: ../code-media
    restart: on-failure:3
    env_file:
      - ../code-media/.env.prod
    volumes:
      - mmedia-data:/app/data
      - mmedia-static:/app/static
    networks:
      - internal

volumes:
  mconnect-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../code-connect/data
  mmedia-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../code-media/data
  mmedia-static:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ../code-media/static
      # device: ../code-media/static/red-cat-pictures
      # device: ../code-media/static/gold-fish-talents
      # redis-data:

networks:
  internal:
    driver: bridge
