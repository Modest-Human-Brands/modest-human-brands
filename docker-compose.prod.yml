services:
  app:
    image: ghcr.io/modest-human-brands/modest-human-brands:latest
    env_file:
      - .env
    volumes:
      - modest-human-brands_data:/app/.data
    networks:
      - internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3

  drive:
    image: ghcr.io/modest-human-brands/mdrive:latest
    env_file:
      - .env
    volumes:
      - mdrive-data:/app/data
      - mdrive-static:/app/static
    networks:
      - internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3

  media:
    image: ghcr.io/modest-human-brands/mmedia:latest
    env_file:
      - .env
    volumes:
      - mdrive-static:/app/static
    networks:
      - internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3
      resources:
        limits:
          cpus: '2'
          memory: 2048M
        reservations:
          cpus: '1'
          memory: 1024M

  ome:
    image: airensoft/ovenmediaengine:latest
    expose:
      - '3333' #
      - '3334'
      - '3480' # LLHSL playback
      - '8080' # HLS/DASH playback
      - '8081' # REST API
      - '10000-10005/udp' #
    ports:
      - 3478 # TURN TCP relay
      - '9999:9999/udp' # SRT ingest
    volumes:
      - /root/modest-human-brands/ome.xml:/opt/ovenmediaengine/bin/origin_conf/Server.xml
      - /root/modest-human-brands/omeRecord.xml:/opt/ovenmediaengine/bin/origin_conf/record_map.xml
      - mdrive-static:/opt/ovenmediaengine/media
    networks:
      - internal
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
        max_attempts: 3

volumes:
  modest-human-brands_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /root/modest-human-brands/.data
  mdrive-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /root/modest-human-brands/mdrive/data
  mdrive-static:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /root/modest-human-brands/mdrive/static

networks:
  internal:
    driver: overlay
